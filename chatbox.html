<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="iframe-styles.css">
</head>
<body>
    <div id="gemini-ui-container">
        <div id="gemini-chat-ui">
            <div id="gemini-chat-header">
                <span data-key="geminiChat">Gemini Chat</span>
                <div class="header-actions">
                    <button id="gemini-summarize-button" title="Summarize this page">
                        <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                    </button>
                    <button id="gemini-settings-button"><img id="settings-icon" src="settings-dark.png" alt="Settings"/></button>
                </div>
            </div>
            <div id="gemini-chat-history"></div>
            <div id="image-preview-container"></div>
            <div id="gemini-input-area">
                <input type="file" id="image-upload-input" accept="image/*" style="display: none;">
                <div id="input-wrapper">
                    <button id="image-upload-button">
                        <img id="upload-icon" src="upload-dark.png" alt="Upload Image"/>
                    </button>
                    <textarea id="gemini-prompt-input" placeholder="Type your message..."></textarea>
                    <button id="gemini-mic-button" title="Voice Dictation">🎙️</button>
                    <button id="gemini-send-button" title="Send"><img id="send-icon" src="" alt="Send"/></button>
                    <button id="gemini-stop-button" title="Stop generation">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
                    </button>
                </div>
            </div>
        </div>

        <div id="gemini-settings-ui">
            <div id="gemini-settings-header">
                <span data-key="settings">Settings</span>
                <button id="gemini-back-button"><img id="back-icon" src="arrow-left-dark.png" alt="Back"/></button>
            </div>
            <div id="gemini-settings-content">
                <div class="settings-group">
                    <h3 class="settings-group-title">Appearance</h3>
                    <div class="settings-section">
                        <p class="settings-label" data-key="theme">Theme</p>
                        <div class="theme-switcher">
                            <div class="tabs">
                                <input type="radio" id="radio-dark" name="theme" value="dark" checked>
                                <label class="tab" for="radio-dark" data-key="dark">Dark</label>
                                <input type="radio" id="radio-light" name="theme" value="light">
                                <label class="tab" for="radio-light" data-key="light">Light</label>
                                <span class="glider"></span>
                            </div>
                        </div>
                    </div>
                    <div class="settings-section">
                        <p class="settings-label" data-key="chatboxSize">Chatbox Size</p>
                        <div class="size-switcher">
                            <div class="tabs">
                                <input type="radio" id="radio-default" name="size" value="default" checked>
                                <label class="tab" for="radio-default" data-key="default">Default</label>
                                <input type="radio" id="radio-large" name="size" value="large">
                                <label class="tab" for="radio-large" data-key="large">Large</label>
                                <span class="glider"></span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="settings-group">
                    <h3 class="settings-group-title">Functionality</h3>
                    <div class="settings-section">
                        <p class="settings-label" data-key="autoExpand">Auto-expand on long text</p>
                        <label class="switch">
                            <input type="checkbox" id="auto-expand-checkbox" checked>
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="settings-section">
                        <p class="settings-label" data-key="ttsEnabled">Text-to-Speech button</p>
                        <label class="switch">
                            <input type="checkbox" id="tts-checkbox" checked>
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="settings-section">
                        <p class="settings-label" data-key="copyEnabled">Copy answer button</p>
                        <label class="switch">
                            <input type="checkbox" id="copy-checkbox" checked>
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>

                <div class="settings-group">
                    <h3 class="settings-group-title">Position</h3>
                    <div class="settings-section">
                        <p class="settings-label" data-key="widgetPosition">Widget Corner</p>
                        <div class="corner-picker" id="corner-picker">
                            <button class="corner-btn" data-corner="top-left"     title="Top Left">↖</button>
                            <button class="corner-btn" data-corner="top-right"    title="Top Right">↗</button>
                            <button class="corner-btn" data-corner="bottom-left"  title="Bottom Left">↙</button>
                            <button class="corner-btn" data-corner="bottom-right" title="Bottom Right (default)">↘</button>
                        </div>
                    </div>
                    <button id="reset-position-button" class="settings-button" data-key="resetPosition">Reset to Default Position</button>
                </div>

                <div class="settings-group">
                    <h3 class="settings-group-title">General</h3>
                    <div class="settings-section">
                        <p class="settings-label" data-key="language">Language</p>
                        <div class="select">
                            <div class="selected" data-english="English" data-vietnamese="Vietnamese"></div>
                            <div class="options">
                                <div title="English">
                                    <input id="lang-en" name="language" type="radio" value="en" checked />
                                    <label class="option" for="lang-en">
                                        <img src="english.png" alt="English Flag"/>
                                        <span data-txt="English"></span>
                                    </label>
                                </div>
                                <div title="Vietnamese">
                                    <input id="lang-vi" name="language" type="radio" value="vi" />
                                    <label class="option" for="lang-vi">
                                        <img src="vietnamese.png" alt="Vietnamese Flag"/>
                                        <span data-txt="Vietnamese"></span>
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="settings-section">
                        <p class="settings-label" data-key="rememberChoice">Remember my choice</p>
                        <label class="switch">
                            <input type="checkbox" id="persist-settings-checkbox">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>

                <div class="settings-group">
                    <h3 class="settings-group-title">Data</h3>
                    <button id="export-chat-button" class="settings-button" data-key="exportChat">Export Chat</button>
                    <button id="clear-chat-button" class="settings-button" data-key="clearChat">Clear Chat History</button>
                </div>
            </div>
        </div>
    </div>
    <div id="confirmation-modal" class="hidden">
        <div class="confirmation-box">
            <p class="confirmation-text" data-key="clearConfirm">Are you sure?</p>
            <div class="confirmation-actions">
                <button id="confirm-yes" class="confirm-btn" data-key="yes">Yes</button>
                <button id="confirm-no" class="confirm-btn" data-key="no">No</button>
            </div>
        </div>
    </div>
    <div id="success-modal" class="hidden">
        <div class="confirmation-box">
            <p class="confirmation-text" data-key="chatCleared">Chat history cleared!</p>
            <div class="confirmation-actions">
                <button id="success-ok" class="confirm-btn" data-key="ok">OK</button>
            </div>
        </div>
    </div>
    <script src="chatbox.js"></script>
</body>
</html>
